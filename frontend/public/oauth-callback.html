<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conectando...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #334155;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #E2E8F0;
      border-top-color: #1E40AF;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 20px;
    }
    h2 { font-size: 18px; font-weight: 600; margin: 0 0 8px; }
    p { font-size: 14px; color: #64748B; margin: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h2>Conectando con Facebook</h2>
    <p>Esta ventana se cerrara automaticamente...</p>
  </div>
  <script>
    // Extract the OAuth code from URL and send it back to the parent window
    (function() {
      var params = new URLSearchParams(window.location.search);
      var code = params.get('code');
      var error = params.get('error');

      if (code && window.opener) {
        // Send code to parent window (works cross-origin)
        window.opener.postMessage({ type: 'META_OAUTH_CODE', code: code }, '*');
        setTimeout(function() { window.close(); }, 1500);
      } else if (error) {
        document.querySelector('h2').textContent = 'Error de conexion';
        document.querySelector('p').textContent = params.get('error_description') || error;
        document.querySelector('.spinner').style.display = 'none';
        setTimeout(function() { window.close(); }, 3000);
      }
    })();
  </script>
</body>
</html>
