<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Conectando con Facebook...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #F1F5F9;
      color: #334155;
    }
    .msg {
      text-align: center;
      padding: 40px;
    }
    .msg h2 { margin-bottom: 8px; font-size: 18px; }
    .msg p { color: #64748B; font-size: 14px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #E2E8F0;
      border-top-color: #1877F2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="msg">
    <div class="spinner"></div>
    <h2>Conectando con Facebook</h2>
    <p>Esta ventana se cerrara automaticamente...</p>
  </div>
</body>
</html>
