services:
  db:
    container_name: alpelo-database
    image: postgis/postgis:16-3.4
    ports:
      - "5433:5432"
    volumes:
      - C:/Users/user/PROYECTOBD/BD-AlPelo/database_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-service:
    container_name: alpelo-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - WAIT_FOR_DB=${WAIT_FOR_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend-service:
    container_name: alpelo-frontend
    build: ./frontend
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend-service

volumes:
  frontend_node_modules:
